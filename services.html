<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Services — Rasha Adel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="logo11.jpg" alt="Rasha Adel">
      <h1>Rasha Adel</h1>
      <p class="sub">Beauty Centre & Spa</p>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard_admin.html">لوحة المدير</a>
      <a class="nav-item" href="clients.html">سجل العملاء</a>
      <a class="nav-item active" href="services.html">الخدمات</a>
      <a class="nav-item" href="admin_users.html">إدارة المستخدمين</a>
      <a class="nav-item" href="index.html">تسجيل خروج</a>
    </nav>
  </aside>

  <main class="main">
    <div class="container">
      <h2>إدارة الخدمات</h2>

      <div class="form-box">
        <form id="svcForm">
          <div class="form-grid">
            <div class="form-group">
              <label>اسم الخدمة</label>
              <input id="svc_name">
            </div>

            <div class="form-group">
              <label>السعر (ج)</label>
              <input id="svc_price" type="number">
            </div>
          </div>

          <div style="margin-top:12px">
            <button class="btn btn-primary" type="submit">إضافة خدمة</button>
          </div>
        </form>
      </div>

      <div class="panel" id="servicesList"></div>

      <div class="footer-line">
        © 2025 Rasha Adel Beauty Center & Spa – Designed & Developed by Mohamed Ali
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    function renderServicesList() {
      const services = window.app.getServices() || [];
      const container = document.getElementById('servicesList');

      container.innerHTML = `
        <h3>الخدمات الحالية</h3>
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>الخدمة</th>
              <th>السعر</th>
            </tr>
          </thead>
          <tbody>
            ${services.map((s, i) => `
              <tr>
                <td>${i + 1}</td>
                <td>${s.name}</td>
                <td>${s.price}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    document.getElementById('svcForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('svc_name').value.trim();
      const price = parseFloat(document.getElementById('svc_price').value) || 0;

      if (!name || price <= 0) {
        alert('الرجاء إدخال اسم وسعر صحيح');
        return;
      }

      const id = Date.now();
      window.app.addService({ id, name, price });
      renderServicesList();
      this.reset();
    });

    document.addEventListener('DOMContentLoaded', renderServicesList);
  </script>
</body>
</html>
