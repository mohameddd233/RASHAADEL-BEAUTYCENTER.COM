<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>حجز موعد / Book a Booking — Rasha Adel</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .booking-card { max-width:800px; margin:40px auto; padding:24px; border-radius:14px; background:rgba(255,255,255,0.95); box-shadow:0 12px 40px rgba(0,0,0,0.06); }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .note { color:var(--muted); font-size:14px; margin-top:8px }
    @media (max-width:820px){ .two-col{grid-template-columns:1fr} }
  </style>
</head>
<body>
<main class="main">
  <div class="container">
    <div class="booking-card">
      <div style="text-align:center;margin-bottom:14px">
        <img src="assets/logo11.jpg" alt="Rasha Adel" style="width:90px;border-radius:10px">
        <h2>احجز موعدك الآن — Book a booking</h2>
        <p class="note">املأ البيانات التالية وسيصلك تأكيد. / Fill the fields then confirm.</p>
      </div>

      <form id="bookingForm">
        <div class="two-col">
          <div>
            <label>الاسم كامل / Full name</label>
            <input id="b_name" required>
          </div>
          <div>
            <label>الهاتف / Phone</label>
            <input id="b_phone" required>
          </div>
          <div>
            <label>البريد الإلكتروني (اختياري) / Email (optional)</label>
            <input id="b_email" type="email">
          </div>
          <div>
            <label>الخدمة / Service</label>
            <select id="b_service" required>
              <option value="">--- اختر خدمة / Select service ---</option>
            </select>
          </div>
          <div>
            <label>التاريخ / Date</label>
            <input id="b_date" type="date" required>
          </div>
          <div>
            <label>الوقت / Time</label>
            <input id="b_time" type="time" required>
          </div>
        </div>

        <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end">
          <button class="btn btn-outline" type="reset">مسح / Reset</button>
          <button class="btn btn-primary" id="confirmBooking" type="submit">تأكيد الحجز • Book Now</button>
        </div>

        <p id="bookingMsg" style="margin-top:12px;color:var(--muted)"></p>
      </form>
    </div>

    <div class="footer-line">© 2025 Rasha Adel Beauty Center & Spa – Designed & Developed by Mohamed Ali</div>
  </div>
</main>

<script>
(function(){
  // جلب الخدمات من window.app أو localStorage
  function getServicesFallback() {
    try {
      return (window.app && window.app.getServices && window.app.getServices()) || JSON.parse(localStorage.getItem('services')) || [];
    } catch(e) {
      return JSON.parse(localStorage.getItem('services') || '[]');
    }
  }

  function getBookings() {
    return JSON.parse(localStorage.getItem('bookings') || '[]');
  }

  function saveBookings(bookings) {
    localStorage.setItem('bookings', JSON.stringify(bookings));
    if(window.app && !window.app.getBookings) window.app.getBookings = getBookings;
  }

  // عرض الخدمات في select
  const services = getServicesFallback();
  const sel = document.getElementById('b_service');
  services.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = '${svc_name} — ${svc_price ? svc_price + " ج" : ""}';
    sel.appendChild(opt);
  });

  // ضبط التاريخ الافتراضي اليوم
  document.addEventListener('DOMContentLoaded', ()=> {
    const d = new Date();
    const el = document.getElementById('b_date');
    el.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });

  document.getElementById('bookingForm').addEventListener('submit', function(e){
    e.preventDefault();
    const name = document.getElementById('b_name').value.trim();
    const phone = document.getElementById('b_phone').value.trim();
    const email = document.getElementById('b_email').value.trim();
    const serviceId = document.getElementById('svc_name').value;
    const date = document.getElementById('b_date').value;
    const time = document.getElementById('b_time').value;

    if(!name || !phone || !serviceId || !date || !time){
      document.getElementById('bookingMsg').innerText = 'الرجاء إكمال الحقول المطلوبة • Please fill required fields';
      return;
    }

    const serviceObj = services.find(x => String(x.id) === String(serviceId)) || { name: serviceId };
    const bookings = getBookings();
    const id = Date.now();

    const booking = {
      id,
      name,
      phone,
      email,
      serviceId: serviceObj.id || serviceId,
      serviceName: serviceObj.name || serviceId,
      date,
      time,
      status: 'new',
      ticketNumber: null,
      created: new Date().toISOString()
    };

    bookings.push(booking);
    saveBookings(bookings);

    document.getElementById('bookingMsg').innerText = '✅ تم الحجز بنجاح — Your booking is recorded. رقم الحجز: ' + id;
    this.reset();

    // إعادة التاريخ الافتراضي
    const d = new Date();
    document.getElementById('b_date').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });
})();
</script>
</body>
</html>
