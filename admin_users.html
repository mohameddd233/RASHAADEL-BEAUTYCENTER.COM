<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Manage Users — Rasha Adel</title><link rel="stylesheet" href="assets/style.css"></head><body>
  <aside class="sidebar"><div class="brand"><img src="assets/logo11.jpg" alt="Rasha Adel"><h1>Rasha Adel</h1><p class="sub">Beauty Centre & Spa</p></div><nav class="nav"><a class="nav-item" href="dashboard_admin.html">لوحة المدير</a><a class="nav-item active" href="admin_users.html">إدارة المستخدمين</a><a class="nav-item" href="services.html">الخدمات</a><a class="nav-item" href="index.html">تسجيل خروج</a></nav></aside>
  <main class="main"><div class="container"><h2>إضافة مستخدم جديد</h2><div class="form-box"><form id="userForm"><div class="form-grid"><div class="form-group"><label>اسم المستخدم</label><input id="u_name"></div><div class="form-group"><label>كلمة السر</label><input id="u_pass" type="password"></div><div class="form-group"><label>الصلاحية</label><select id="u_role"><option value="staff">موظف</option><option value="admin">مدير</option></select></div></div><div style="margin-top:12px"><button class="btn btn-primary" type="submit">إنشاء مستخدم</button></div></form></div><div class="panel" id="usersList"></div><div class="footer-line">© 2025 Rasha Adel Beauty Center & Spa – Designed & Developed by Mohamed Ali</div></div></main><script src="assets/app.js"></script><script>function renderUsers(){const users=window.app.getUsers()||[];document.getElementById('usersList').innerHTML='<h3>المستخدمون</h3><table class="table"><thead><tr><th>#</th><th>اسم المستخدم</th><th>الصلاحية</th></tr></thead><tbody>'+users.map((u,i)=>`<tr><td>${i+1}</td><td>${u.username}</td><td>${u.role}</td></tr>`).join('')+'</tbody></table>'}document.getElementById('userForm').addEventListener('submit', function(e){e.preventDefault();const username=document.getElementById('u_name').value.trim();const password=document.getElementById('u_pass').value.trim();const role=document.getElementById('u_role').value;if(!username||!password){alert('الرجاء إدخال اسم مستخدم وكلمة سر');return;}const exists=(window.app.getUsers()||[]).some(u=>u.username===username);if(exists){alert('اسم المستخدم موجود بالفعل');return;}window.app.addUser({username,password,role});renderUsers();this.reset();});document.addEventListener('DOMContentLoaded', renderUsers);</script></body></html>
