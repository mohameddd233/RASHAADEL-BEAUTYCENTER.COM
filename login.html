<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login — Rasha Adel</title><link rel="stylesheet" href="assets/style.css"></head><body>
  <aside class="sidebar" aria-hidden="true"><div class="brand"><img src="assets/logo11.jpg" alt="Rasha Adel"><h1>Rasha Adel</h1><p class="sub">Beauty Centre & Spa</p></div></aside>
  <main class="main"><div class="container"><div class="form-box" style="max-width:420px;margin:40px auto"><img src="assets/logo11.jpg" alt="logo" style="width:96px;border-radius:8px;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto"><h2 style="text-align:center">تسجيل الدخول</h2><form id="loginForm"><div class="form-group"><label>اسم المستخدم</label><input id="username"></div><div class="form-group"><label>كلمة السر</label><input id="password" type="password"></div><div style="margin-top:12px"><button class="btn btn-primary" type="submit">دخول</button></div></form><p style="text-align:center;margin-top:10px;color:var(--muted)">حساب المدير: rashaadel23 / rashaadel2333</p></div><div class="footer-line">© 2025 Rasha Adel Beauty Center & Spa – Designed & Developed by Mohamed Ali</div></div></main><script src="assets/app.js"></script><script>document.getElementById('loginForm').addEventListener('submit', function(e){e.preventDefault();const u=document.getElementById('username').value.trim();const p=document.getElementById('password').value.trim();const user=window.app.login(u,p);if(user){ if(user.role==='admin') location.href='dashboard_admin.html'; else location.href='dashboard_staff.html'; } else alert('اسم مستخدم أو كلمة مرور غير صحيحة'); });(function(){const params=new URLSearchParams(location.search);const role=params.get('role');if(role==='admin') document.getElementById('username').value='rashaadel23'; if(role==='staff') document.getElementById('username').value='mariam';})();</script></body></html>
