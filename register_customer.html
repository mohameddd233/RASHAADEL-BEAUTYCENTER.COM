<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تسجيل عميل — موظف | Rasha Adel</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/logo11.jpg" alt="Rasha Adel">
      <h1>Rasha Adel</h1>
      <p class="sub">Beauty Centre & Spa</p>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard_staff.html">لوحة الموظف</a>
      <a class="nav-item active" href="register_customer_staff.html">تسجيل عميل</a>
      <a class="nav-item" href="invoice.html">عمل فاتورة</a>
      <a class="nav-item" href="index.html">تسجيل خروج</a>
    </nav>
  </aside>

  <main class="main">
    <div class="container register-page">
      <div class="register-card form-box register-card">
        <h1 style="text-align:center">تسجيل عميل جديد</h1>
        <h4 style="text-align:center;color:var(--muted);margin-bottom:18px">New Customer Registration</h4>
        <form id="regForm">
          <div class="form-grid">
            <div>
              <div class="form-group">
                <label>الاسم بالكامل</label>
                <input id="c_name" required>
              </div>
              <div class="form-group">
                <label>رقم الهاتف</label>
                <input id="c_phone" required>
              </div>
              <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input id="c_email">
              </div>
            </div>
            <div>
              <div class="form-group">
                <label>العنوان</label>
                <input id="c_address">
              </div>
              <div class="form-group">
                <label>ملاحظات صحية</label>
                <textarea id="c_health"></textarea>
              </div>
            </div>
          </div>
          <div style="margin-top:12px">
            <button class="btn btn-primary" type="submit">تسجيل العميل</button>
          </div>
        </form>
      </div>
      <div class="footer-line">
        © 2025 Rasha Adel Beauty Center & Spa – Designed & Developed by Mohamed Ali
      </div>
    </div>
  </main>

  <script src="assets/app.js"></script>
  <script>
    document.getElementById('regForm').addEventListener('submit', function(e){
      e.preventDefault();
      const name = document.getElementById('c_name').value.trim();
      const phone = document.getElementById('c_phone').value.trim();
      const email = document.getElementById('c_email').value.trim();
      const address = document.getElementById('c_address').value.trim();
      const health = document.getElementById('c_health').value.trim();

      if (!name || !phone) {
        alert('الرجاء إدخال الاسم ورقم الهاتف');
        return;
      }

      window.app.addClient({
        id: Date.now(),
        name, phone, email, address, health,
        created: new Date().toISOString()
      });

      alert('✅ تم تسجيل العميل بنجاح');
      this.reset();
    });
  </script>
</body>
</html>
