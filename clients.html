<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Clients — Rasha Adel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- الشريط الجانبي -->
  <aside class="sidebar">
    <div class="brand">
      <img src="logo11.jpg" alt="Rasha Adel">
      <h1>Rasha Adel</h1>
      <p class="sub">Beauty Centre & Spa</p>
    </div>
    <nav class="nav">
     <a class="nav-item active" href="dashboard_admin.html">لوحة المدير</a>
      <a class="nav-item" href="invoice_admin.html">الفواتير</a>
      <a class="nav-item" href="services.html">الخدمات</a>
      <a class="nav-item active" href="invoice_history.html">سجل العملاء</a>
      <a class="nav-item" href="register_customer_admin.html">تسجيل عميل</a>
      <a class="nav-item" href="admin_users.html">إدارة المستخدمين</a>
      <a class="nav-item" href="index.html">تسجيل خروج</a>
    </nav>
  </aside>

  <!-- المحتوى الرئيسي -->
  <main class="main">
    <div class="container">
      <h2>سجل العملاء</h2>

      <div class="panel">
        <table class="table" id="clientsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>الاسم</th>
              <th>الهاتف</th>
              <th>آخر تحديث</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="footer-line">
        © 2025 Rasha Adel Beauty Center & Spa – Designed & Developed by Mohamed Ali
      </div>
    </div>
  </main>

  <script src="app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const clients = window.app.getClients() || [];
      const tbody = document.querySelector('#clientsTable tbody');

      tbody.innerHTML = '';

      clients.forEach((c, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${c.name}</td>
          <td>${c.phone}</td>
          <td>${new Date(c.created).toLocaleString('ar-EG')}</td>
        `;
        tbody.appendChild(tr);
      });
    });
  </script>

</body>
</html>
